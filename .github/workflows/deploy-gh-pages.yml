name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "salary-registry/packages/nextjs/**"
      - "salary-registry/packages/foundry/src/**"
      - ".github/workflows/deploy-gh-pages.yml"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('salary-registry/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        working-directory: salary-registry
        run: pnpm install --ignore-scripts

      - name: Build static export
        working-directory: salary-registry
        env:
          NEXT_PUBLIC_ALCHEMY_API_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_API_KEY }}
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID }}
          NEXT_PUBLIC_IPFS_BUILD: "true"
          NEXT_PUBLIC_BASE_PATH: "/Skill-Demo"
          NEXT_PUBLIC_IGNORE_BUILD_ERROR: "true"
        run: pnpm next:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: salary-registry/packages/nextjs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
